name: release

# Build the installer and publish it to a GitHub Release when a version tag is
# pushed (e.g. `git tag v1.2.3 && git push origin v1.2.3`).
on:
  push:
    tags:
      - 'v*'

# Least privilege by default; the release job opts into write below.
permissions:
  contents: read

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write        # required to create the release + upload the asset
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Compute version from tag
        shell: pwsh
        run: |
          $v = $env:GITHUB_REF_NAME.TrimStart('v')          # 1.2.3
          "VERSION=$v" >> $env:GITHUB_ENV
          $p = $v.Split('.'); while ($p.Count -lt 4) { $p += '0' }
          "VERSION4=$($p -join '.')" >> $env:GITHUB_ENV      # 1.2.3.0

      - name: Publish (self-contained win-x64)
        shell: pwsh
        run: |
          dotnet publish app/src/AvellSucks.UI/AvellSucks.UI.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=$env:VERSION `
            -p:FileVersion=$env:VERSION4 `
            -p:AssemblyVersion=$env:VERSION4 `
            -p:InformationalVersion=$env:VERSION `
            -p:DebugType=None -p:DebugSymbols=false `
            -o dist/publish

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --version=6.7.3 --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          # ISCC resolves relative [Files] Source paths from the .iss directory,
          # not the CWD — pass ABSOLUTE paths or the installer ships empty.
          $pub = (Resolve-Path dist/publish).Path
          $out = (Resolve-Path dist).Path
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\AvellSucks.iss `
            /DMyAppVersion=$env:VERSION `
            /DPublishDir="$pub" `
            /DOutputDir="$out"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            --title $env:GITHUB_REF_NAME `
            --generate-notes `
            --verify-tag `
            "dist/AvellSucks-Setup.exe"
