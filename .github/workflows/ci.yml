name: ci

# Build + test on every push and pull request. The suite is host-independent
# (no real EC/WMI access — the hardware backends are faked in tests), so it runs
# on a stock windows-latest runner.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Build (Release)
        run: dotnet build app/AvellSucks.Replacement.slnx -c Release --nologo

      - name: Test
        run: dotnet test app/AvellSucks.Replacement.slnx -c Release --no-build --nologo
